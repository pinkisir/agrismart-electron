name: Build ARM64 Deb Package

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build Ubuntu 18.04 ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 Deb Package in Ubuntu 18.04
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu18.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y curl ca-certificates build-essential fakeroot dpkg rpm libarchive-tools
            curl -fsSL https://nodejs.org/dist/v16.20.2/node-v16.20.2-linux-arm64.tar.xz -o /tmp/node.tar.xz
            tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
            corepack disable || true
          run: |
            node --version
            npm --version
            npm ci
            npm run build:linux

      - name: List release files
        run: ls -la release

      - name: Upload Deb Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: agrismart-arm64-deb
          path: release/*.deb
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: agrismart-arm64-deb
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

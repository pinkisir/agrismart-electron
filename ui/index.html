<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024, height=600, initial-scale=1.0" />
    <title>AgriSmart Controller</title>
    <!-- Font Awesome Local -->
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <!-- 全屏页面：登录 / 项目选择 -->
    <div id="fullscreen-page" class="fullscreen-page"></div>

    <!-- 主应用布局 -->
    <div id="app" class="app hidden">

        <!-- 顶栏 (可拖拽) -->
        <header class="topbar" data-tauri-drag-region>
            <div class="topbar-left" data-tauri-drag-region>
                <i class="fa-solid fa-seedling logo-icon"></i>
                <span class="logo-text">AgriSmart</span>
                <span class="divider"></span>
                <!-- 项目切换 -->
                <div class="project-switcher" id="project-switcher">
                    <button class="project-switcher-btn" id="btn-project-switch">
                        <i class="fa-solid fa-location-dot"></i>
                        <span id="topbar-project">未选择项目</span>
                        <i class="fa-solid fa-chevron-down" style="font-size:9px"></i>
                    </button>
                    <div class="project-dropdown" id="project-dropdown"></div>
                </div>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn alert-btn" id="topbar-alert" title="告警">
                    <i class="fa-solid fa-bell"></i>
                    <span class="alert-badge" id="alert-count">0</span>
                </button>
                <span class="topbar-time" id="topbar-time">--:--</span>
                <span class="topbar-user" id="topbar-user">--</span>
                <!-- 主题切换 -->
                <button class="topbar-btn" id="btn-theme" title="切换主题">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
                <button class="topbar-btn danger" id="btn-logout" title="退出登录">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>

            </div>
        </header>

        <!-- 中间区域 -->
        <div class="main-body">
            <!-- 侧边栏 -->
            <nav class="sidebar">
                <a class="nav-item active" data-page="dashboard">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>首页</span>
                </a>
                <a class="nav-item" data-page="devices">
                    <i class="fa-solid fa-microchip"></i>
                    <span>设备</span>
                </a>
                <a class="nav-item" data-page="valves">
                    <i class="fa-solid fa-faucet-drip"></i>
                    <span>阀门</span>
                </a>
                <a class="nav-item" data-page="groups">
                    <i class="fa-solid fa-users-gear"></i>
                    <span>轮灌</span>
                </a>
                <a class="nav-item" data-page="plans">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>计划</span>
                </a>
                <a class="nav-item" data-page="zones">
                    <i class="fa-solid fa-map-location-dot"></i>
                    <span>区域</span>
                </a>
                <a class="nav-item" data-page="categories">
                    <i class="fa-solid fa-folder-tree"></i>
                    <span>分类</span>
                </a>
            </nav>

            <!-- 内容区 -->
            <main class="content" id="content"></main>
        </div>

        <!-- 底栏 -->
        <footer class="footer">
            <span class="footer-dot"><span class="dot dot-green"></span> API 已连接</span>
            <span class="footer-dot"><span class="dot dot-green"></span> MQTT 已连接</span>
            <span class="spacer">v1.0.0</span>
        </footer>
    </div>

    <!-- 模态弹窗 -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal" id="modal-box">
            <div class="modal-header">
                <span class="modal-header-title" id="modal-title">提示</span>
                <button class="modal-close-btn" id="modal-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer">
                <button class="btn btn-ghost btn-sm" id="modal-cancel">取消</button>
                <button class="btn btn-primary btn-sm" id="modal-confirm">确定</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
